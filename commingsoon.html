<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #080808;
            --bg2: #0f0f0f;
            --bg3: #161616;
            --bg4: #1e1e1e;
            --white: #f5f5f5;
            --white2: #d0d0d0;
            --muted: #888;
            --muted2: #555;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.14);
            --silver: #c8c8c8;
            --chrome: #e8e8e8;
            --radius: 8px;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'Space Mono', monospace;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.7;
            overflow-x: hidden;
        }
        h1 {
            font-family: var(--font-display);
            font-size: 3rem;
            text-align: center;
            margin-top: 20vh;
            color: var(--white2);
        }
    </style>
</head>
<body>
    <h1>
        Coming Soon
    </h1>
</body>
</html>
